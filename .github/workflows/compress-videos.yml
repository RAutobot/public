name: Compress Videos
run-name: Compress Videos (${{ inputs.video-scale }}, ${{ inputs.video-audio && 'Audio' || 'No Audio' }})
on:
  workflow_dispatch:
    inputs:
      cookies:
        description: Cookies
      video-urls:
        description: JSON array of video URL
        required: true
      video-scale:
        description: Video scale
        type: choice
        options: [1080, 720, 480, 360, 240, 144]
      video-audio:
        description: Video audio
        default: true
        type: boolean

jobs:
  compress-videos:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        video-url: ${{ fromJson(inputs.video-urls) }}
      fail-fast: false
    steps:
      - name: Set up FFmpeg
        run: curl -sSL "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz" | tar -xJ -f - --occurrence --wildcards "*/bin/ffmpeg"

      - name: Download video
        run: |
          filename="$(curl -sSLOJ -w "%{filename_effective}" -b "${{ inputs.cookies }}" "${{ matrix.video-url }}")"
          printf "%s\n" "INPUT_FILE=$filename" "OUTPUT_FILE=${filename%.*}.mkv" >> "$GITHUB_ENV"

      - name: Compress video
        run: |
          ./*/bin/ffmpeg \
            -nostats \
            -i "$INPUT_FILE" \
            -c:v libx265 \
            -crf 30 \
            -pix_fmt yuv420p10le \
            -vf "scale='if(gt(iw, ih), -2, min(iw, ${{ inputs.video-scale }}))':'if(gt(iw, ih), min(ih, ${{ inputs.video-scale }}), -2)'" \
            ${{ inputs.video-audio && '-c:a libopus' || '-an' }} \
            "$OUTPUT_FILE"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          archive: false
          path: ${{ env.OUTPUT_FILE }}

  merge-artifacts:
    needs: compress-videos
    runs-on: ubuntu-latest
    steps:
      - name: Merge artifacts
        uses: actions/upload-artifact/merge@v7
        with:
          name: !${{ github.run_number }}
